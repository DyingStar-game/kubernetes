name: Deploy to Preprod

on:
  repository_dispatch:
    types: [deploy-preprod]
  workflow_dispatch:
    inputs:
      chart:
        description: "Chart to restart (godotserver, horizon, service-resourcesdynamic, keycloak, livekit)"
        required: true
        type: choice
        options:
          - godotserver
          - horizon
          - service-resourcesdynamic
          - keycloak
          - livekit

# repository_dispatch payload (sent by service repo after pushing image:develop):
#   {
#     "event_type": "deploy-preprod",
#     "client_payload": {
#       "chart": "godotserver"
#     }
#   }

jobs:
  deploy:
    name: Restart Preprod Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "chart=${{ github.event.client_payload.chart }}" >> "$GITHUB_OUTPUT"
          else
            echo "chart=${{ inputs.chart }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate chart name
        run: |
          CHART="${{ steps.inputs.outputs.chart }}"
          if [[ ! "$CHART" =~ ^(godotserver|horizon|service-resourcesdynamic|keycloak|livekit)$ ]]; then
            echo "::error::Invalid chart name: $CHART"
            exit 1
          fi

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollout restart
        run: |
          CHART="${{ steps.inputs.outputs.chart }}"
          kubectl rollout restart deployment/"${CHART}" -n dyingstar-preprod
          kubectl rollout status deployment/"${CHART}" -n dyingstar-preprod --timeout=300s

      - name: Restart horizon when godotserver is updated
        if: steps.inputs.outputs.chart == 'godotserver'
        run: |
          if kubectl get deployment/horizon -n dyingstar-preprod >/dev/null 2>&1; then
            kubectl rollout restart deployment/horizon -n dyingstar-preprod
            kubectl rollout status deployment/horizon -n dyingstar-preprod --timeout=300s
          else
            echo "horizon deployment not found in dyingstar-preprod, skipping cascade restart"
          fi
