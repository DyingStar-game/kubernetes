apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "horizon.fullname" . }}
  labels:
    {{- include "horizon.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "horizon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "horizon.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "horizon.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.dependsOn .Values.pluginsImage.enabled }}
      initContainers:
        {{- range .Values.dependsOn }}
        - name: wait-for-{{ .name }}
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ .service }} {{ .port }}; do echo "waiting for {{ .service }}:{{ .port }}..."; sleep 2; done']
        {{- end }}
        {{- if .Values.pluginsImage.enabled }}
        - name: copy-plugins
          image: "{{ .Values.pluginsImage.repository }}:{{ .Values.pluginsImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.pluginsImage.pullPolicy }}
          command: ['sh', '-c', 'cp /plugins/* /shared-plugins/']
          volumeMounts:
            - name: plugins
              mountPath: /shared-plugins
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.pluginsImage.enabled .Values.volumeMounts }}
          volumeMounts:
            {{- if .Values.pluginsImage.enabled }}
            - name: plugins
              mountPath: /app/plugins
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.pluginsImage.enabled .Values.volumes }}
      volumes:
        {{- if .Values.pluginsImage.enabled }}
        - name: plugins
          emptyDir: {}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
