# Local dev overrides for horizon (minikube)
# Usage: helm upgrade --install -n dyingstar-dev-local horizon ./horizon -f horizon/values-dev-local.yaml
# Or via Skaffold: skaffold dev -p horizon

replicaCount: 1

image:
  repository: horizon
  pullPolicy: Never
  tag: dev

service:
  nodePort: 7040

# uncomment if you use godotserver running in local (F5), otherwise horizon will
#   connect to godotserver pod in minikube
# extraEnv:
#  - name: GAME_SERVER_HOST
#    value: "host.minikube.internal"

pluginsImage:
  enabled: true
  repository: horizon-plugins
  pullPolicy: Never
  tag: dev

resources:
  requests:
    cpu: 1
    memory: 512Mi
  limits:
    cpu: 4
    memory: 2Gi
