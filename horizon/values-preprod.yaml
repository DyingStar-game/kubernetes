# Preprod overrides for horizon
# Usage: helm upgrade --install -n dyingstar-preprod horizon ./horizon -f horizon/values-preprod.yaml

replicaCount: 1

image:
  repository: harbor.dyingstar-game.space/dyingstar/horizon
  pullPolicy: Always
  tag: "develop"

pluginsImage:
  enabled: true
  repository: harbor.dyingstar-game.space/dyingstar/horizon-plugins
  pullPolicy: Always
  tag: "develop"

service:
  nodePort: 30100

httpRoute:
  enabled: true
  hostnames:
    - server-preprod.dyingstar-game.space
  parentRefs:
    - name: gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

extraEnv:
  - name: LIVEKIT_URL
    value: "ws://vocal-preprod.dyingstar-game.space"
  - name: LIVEKIT_API_URL
    value: "http://livekit:7880"
  - name: LIVEKIT_API_KEY
    valueFrom:
      secretKeyRef:
        name: livekit-keys
        key: LIVEKIT_API_KEY
  - name: LIVEKIT_API_SECRET
    valueFrom:
      secretKeyRef:
        name: livekit-keys
        key: LIVEKIT_API_SECRET

resources:
  requests:
    cpu: 10
    memory: 2Gi
  limits:
    cpu: 18
    memory: 4Gi
