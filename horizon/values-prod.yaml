# Production overrides for horizon
# Usage: helm upgrade --install -n dyingstar-prod horizon ./horizon -f horizon/values-prod.yaml

replicaCount: 1

image:
  repository: harbor.dyingstar-game.space/dyingstar/horizon
  pullPolicy: IfNotPresent

pluginsImage:
  enabled: true
  repository: harbor.dyingstar-game.space/dyingstar/horizon-plugins
  pullPolicy: IfNotPresent

service:
  nodePort: 30000

httpRoute:
  enabled: true
  hostnames:
    - server.dyingstar-game.space
  parentRefs:
    - name: gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

extraEnv:
  - name: LIVEKIT_URL
    value: "ws://vocal.dyingstar-game.space"
  - name: LIVEKIT_API_URL
    value: "http://livekit:7880"
  - name: LIVEKIT_API_KEY
    valueFrom:
      secretKeyRef:
        name: livekit-keys
        key: LIVEKIT_API_KEY
  - name: LIVEKIT_API_SECRET
    valueFrom:
      secretKeyRef:
        name: livekit-keys
        key: LIVEKIT_API_SECRET

resources:
  requests:
    cpu: 20
    memory: 4Gi
  limits:
    cpu: 36
    memory: 8Gi
