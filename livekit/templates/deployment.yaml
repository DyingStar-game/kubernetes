apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "livekit.fullname" . }}
  labels:
    {{- include "livekit.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if .Values.hostNetwork }}
  # hostNetwork pods bind to host ports; rolling updates can't run two pods
  # at once on the same node, so use Recreate.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "livekit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "livekit.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "livekit.serviceAccountName" . }}
      {{- if .Values.redis.enabled }}
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "livekit.fullname" . }}-redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
      {{- end }}
      enableServiceLinks: false
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- else }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/livekit.yaml"
          ports:
            - name: http
              containerPort: 7880
              protocol: TCP
            - name: rtc-tcp
              containerPort: 7881
              protocol: TCP
            - name: rtc-udp
              containerPort: 7882
              protocol: UDP
            {{- if .Values.livekit.turn.enabled }}
            - name: turn-udp
              containerPort: {{ .Values.livekit.turn.udpPort }}
              protocol: UDP
            {{- if .Values.livekit.turn.tls }}
            - name: turn-tls
              containerPort: {{ .Values.livekit.turn.tlsPort }}
              protocol: TCP
            {{- end }}
            {{- end }}
          env:
            # ─── API key/secret (consumed by livekit.yaml ${VAR} expansion) ─
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "livekit.keysSecretName" . }}
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "livekit.keysSecretName" . }}
                  key: LIVEKIT_API_SECRET
            # ─── Redis password ────────────────────────────────────────────
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "livekit.redisSecretName" . }}
                  key: password
            # ─── TURN ──────────────────────────────────────────────────────
            - name: LIVEKIT_TURN_DOMAIN
              value: {{ .Values.livekit.turn.domain | quote }}
            # ─── Native livekit env vars (override config file) ────────────
            # LIVEKIT_KEYS format: "apiKey: apiSecret" — K8s expands $(VAR)
            - name: LIVEKIT_KEYS
              value: "$(LIVEKIT_API_KEY): $(LIVEKIT_API_SECRET)"
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/livekit.yaml
              subPath: livekit.yaml
            {{- if and .Values.livekit.turn.enabled .Values.livekit.turn.tls }}
            - name: turn-tls
              mountPath: /etc/livekit/certs
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "livekit.fullname" . }}-config
        {{- if and .Values.livekit.turn.enabled .Values.livekit.turn.tls }}
        - name: turn-tls
          secret:
            secretName: {{ include "livekit.turnTlsSecretName" . }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
