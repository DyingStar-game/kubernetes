apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "livekit.fullname" . }}-config
  labels:
    {{- include "livekit.labels" . | nindent 4 }}
data:
  livekit.yaml: |
    port: 7880
    bind_addresses:
      - "0.0.0.0"

    rtc:
      tcp_port: 7881
      udp_port: 7882
      {{- if .Values.livekit.nodeIp }}
      node_ip: {{ .Values.livekit.nodeIp | quote }}
      use_external_ip: false
      {{- else }}
      use_external_ip: true
      {{- end }}

    {{- if .Values.livekit.turn.enabled }}
    turn:
      enabled: true
      udp_port: {{ .Values.livekit.turn.udpPort }}
      {{- if .Values.livekit.turn.tls }}
      tls_port: {{ .Values.livekit.turn.tlsPort }}
      cert_file: /etc/livekit/certs/tls.crt
      key_file:  /etc/livekit/certs/tls.key
      {{- end }}
    {{- end }}

    logging:
      level: {{ .Values.livekit.logLevel | quote }}
      json: true

    redis:
      address: {{ if .Values.redis.externalAddress }}{{ .Values.redis.externalAddress | quote }}{{ else }}{{ printf "%s-redis:6379" (include "livekit.fullname" .) | quote }}{{ end }}
      password: ${REDIS_PASSWORD}
