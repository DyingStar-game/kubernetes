{{/*
Chart-managed Secret holding LIVEKIT_API_KEY / LIVEKIT_API_SECRET.
Created only when the user did NOT pass an existingKeysSecret reference.
For prod and preprod, always set livekit.existingKeysSecret to a Secret
managed out-of-band (and reference the same Secret from horizonserver).
*/}}
{{- if not .Values.livekit.existingKeysSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "livekit.fullname" . }}-keys
  labels:
    {{- include "livekit.labels" . | nindent 4 }}
type: Opaque
stringData:
  LIVEKIT_API_KEY: {{ required "livekit.apiKey is required when livekit.existingKeysSecret is not set" .Values.livekit.apiKey | quote }}
  LIVEKIT_API_SECRET: {{ required "livekit.apiSecret is required when livekit.existingKeysSecret is not set" .Values.livekit.apiSecret | quote }}
{{- end }}
