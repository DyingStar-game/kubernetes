# Production overrides for service-resourcesdynamic
# Usage: helm upgrade --install -n dyingstar-prod service-resourcesdynamic ./service-resourcesdynamic -f service-resourcesdynamic/values-prod.yaml

replicaCount: 1

image:
  repository: harbor.dyingstar-game.space/dyingstar/resources-dynamic
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 512Mi

postgresql:
  enabled: true
  auth:
    password: "CHANGE_ME_IN_PRODUCTION"
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
