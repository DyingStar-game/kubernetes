# Skaffold multi-config for StarDeception local development.
#
# Each service is an independent module (config). Use -m to select which to deploy:
#   skaffold dev -m keycloak,service-resourcesdynamic,godotserver,horizon   # all (local build)
#   skaffold dev -m horizon                                        # single service
#   skaffold dev -m godotserver,horizon-harbor                     # mix local + harbor
#
# Or use ./dev.sh which reads dev-local.conf to pick modules automatically.
#
# Required sibling repos:
#   ../DyingStar     — godotserver (Dockerfile at .docker/Dockerfile)
#   ../horizonserver — horizon     (Dockerfile at .docker/Dockerfile)
#   ../services/resourcesDynamic — service-resourcesdynamic (Dockerfile at docker/Dockerfile)
#   ../services/keycloak         — keycloak                 (Dockerfile at docker/Dockerfile)

# ─── keycloak: local build ──────────────────────────────────────────────────────
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: keycloak
build:
  local:
    push: false
    useBuildkit: true
  artifacts:
    - image: keycloak
      context: ../services/keycloak
      docker:
        dockerfile: docker/Dockerfile
deploy:
  helm:
    flags:
      install: ["--timeout=10m"]
      upgrade: ["--timeout=10m"]
    releases:
      - name: keycloak
        chartPath: keycloak
        namespace: dyingstar-dev-local
        createNamespace: true
        wait: true
        upgradeOnChange: true
        valuesFiles:
          - keycloak/values.yaml
          - keycloak/values-dev-local.yaml
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_keycloak}}"
          image.tag: "{{.IMAGE_TAG_keycloak}}"

# ─── keycloak: harbor image ─────────────────────────────────────────────────────
---
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: keycloak-harbor
deploy:
  helm:
    flags:
      install: ["--timeout=10m"]
      upgrade: ["--timeout=10m"]
    releases:
      - name: keycloak
        chartPath: keycloak
        namespace: dyingstar-dev-local
        createNamespace: true
        wait: true
        upgradeOnChange: true
        valuesFiles:
          - keycloak/values.yaml
          - keycloak/values-dev-local.yaml
          - keycloak/values-dev-local-harbor.yaml

