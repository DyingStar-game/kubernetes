# Preprod overrides for godotserver
# Usage: helm upgrade --install -n dyingstar-preprod godotserver ./godotserver -f godotserver/values-preprod.yaml

replicaCount: 5

image:
  repository: harbor.dyingstar-game.space/dyingstar/godotserver
  pullPolicy: Always
  tag: "develop"

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 256Mi

# Disable the gdb crash-debug wrapper in preprod (lower overhead).
# Set to "1" temporarily via `kubectl set env` to debug a crash.
env:
  - name: DEBUG_GDB
    value: "0"
