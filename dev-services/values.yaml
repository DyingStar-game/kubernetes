# Default values for dev-services.
# Shared developer infrastructure deployed to the dyingstar-dev-shared namespace.

# PostGIS — shared database for all developers
postgis:
  enabled: true
  image:
    repository: postgis/postgis
    tag: "18-3.6"
    pullPolicy: IfNotPresent
  auth:
    username: admin
    password: "changeme-dev"
    database: planets
  extensions: "postgis,postgis_topology"
  service:
    type: NodePort
    port: 5432
    nodePort: 30432
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
