{{/*
Chart-managed Discord OAuth Secret. Created only when the user did NOT pass
an existingSecret reference and Discord IdP bootstrap is enabled. Intended
for dev-local convenience — for prod/preprod always supply existingSecret.
*/}}
{{- if and .Values.keycloak.discord.enabled (not .Values.keycloak.discord.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" . }}-discord
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  DISCORD_CLIENT_ID: {{ required "keycloak.discord.clientId is required when keycloak.discord.existingSecret is not set" .Values.keycloak.discord.clientId | quote }}
  DISCORD_CLIENT_SECRET: {{ required "keycloak.discord.clientSecret is required when keycloak.discord.existingSecret is not set" .Values.keycloak.discord.clientSecret | quote }}
{{- end }}
