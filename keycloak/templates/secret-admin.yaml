{{/*
Chart-managed admin Secret. Created only when the user did NOT pass an
existingSecret reference. Intended for dev-local convenience — for prod and
preprod, always set keycloak.existingSecret to a Secret you manage out-of-band.
*/}}
{{- if not .Values.keycloak.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" . }}-admin
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN: {{ .Values.keycloak.adminUser | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ required "keycloak.adminPassword is required when keycloak.existingSecret is not set" .Values.keycloak.adminPassword | quote }}
{{- end }}
